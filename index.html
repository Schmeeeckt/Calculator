<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="rechner.css">
    <script src="rechner.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>

<body>
    <div id="resultArea"></div>

    <table>
        <tr>
            <td id="parenBtn" onclick="toggleParenthesis()">( )</td>
            <td onclick="clearAll()">CA</td>
            <td onclick="clearEntry()">C</td>
            <td onclick="appendValue('/')" class="opperation">/</td>
        </tr>
        
        <tr>
            <td onclick="appendValue('1')">1</td>
            <td onclick="appendValue('2')">2</td>
            <td onclick="appendValue('3')">3</td>
            <td onclick="appendValue('*')" class="opperation">*</td>
        </tr>

        <tr>
            <td onclick="appendValue('4')">4</td>
            <td onclick="appendValue('5')">5</td>
            <td onclick="appendValue('6')">6</td>
            <td onclick="appendValue('-')" class="opperation">-</td>
        </tr>

        <tr>
            <td onclick="appendValue('7')">7</td>
            <td onclick="appendValue('8')">8</td>
            <td onclick="appendValue('9')">9</td>
            <td onclick="appendValue('+')" class="opperation">+</td>
        </tr>

        <tr>
            <td></td>
            <td onclick="appendValue('0')">0</td>
            <td onclick="appendValue('.')">,</td>
            <td onclick="calculate()" class="equals">=</td>
        </tr>
    </table>
</body>
</html>
